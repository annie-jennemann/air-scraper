name: Fetch AQI Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write        # ← add this

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch AirNow data
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: python fetch_aqi.py

      - name: Commit and push aqi.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aqi.json
          git diff --cached --quiet || git commit -m "chore: update AQI data [skip ci]"
          git push

